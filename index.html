<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="description" content="Nicole's banner from HoYoPlay, turned into a wallpaper.">
	<meta name="author" content="Manadra">
	<title>Nicole's Banner</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
	<link href="assets/css/stylesheet.css" rel="stylesheet">
</head>

<body>

	<video autoplay muted loop id="bg-video">
		<source src="assets/img/bg-video.mp4" type="video/mp4">
		Your browser does not support HTML5 video.
	</video>

	<audio autoplay loop id="bg-audio">
		<source src="assets/audio/bg-music.mp3" type="audio/mpeg">
		Your browser does not support the audio element.
	</audio>

	<div class="content">
		<div class="inner">
			<div class="celestial-clock">
				<!-- Hover Detector -->
				<div class="hover-detector"></div>

				<div class="clock-visuals">
					<div class="gears-container">
						<svg viewBox="0 0 400 400" class="gear" style="animation: gearSpin 180s linear infinite;">
							<defs>
								<radialGradient id="starry-grad" cx="50%" cy="50%" r="50%">
									<stop offset="0%" stop-color="#1b2735" />
									<stop offset="100%" stop-color="#090a0f" />
								</radialGradient>
							</defs>

							<!-- Starry sky background -->
							<circle cx="200" cy="200" r="154" fill="url(#starry-grad)" />

							<!-- Stars -->
							<g fill="#ffffff">
								<circle cx="150" cy="150" r="1.0" opacity="0.6" />
								<circle cx="250" cy="150" r="1.5" opacity="0.8" />
								<circle cx="170" cy="230" r="0.8" opacity="0.5" />
								<circle cx="230" cy="230" r="1.2" opacity="0.7" />
								<circle cx="200" cy="100" r="1.0" opacity="0.6" />
								<circle cx="200" cy="300" r="1.0" opacity="0.6" />
								<circle cx="100" cy="200" r="1.5" opacity="0.8" />
								<circle cx="300" cy="200" r="1.0" opacity="0.5" />
								<circle cx="120" cy="130" r="0.5" opacity="0.4" />
								<circle cx="280" cy="130" r="0.8" opacity="0.5" />
								<circle cx="120" cy="270" r="1.2" opacity="0.7" />
								<circle cx="280" cy="270" r="0.5" opacity="0.4" />
								<circle cx="160" cy="90" r="1.5" opacity="0.8" />
								<circle cx="240" cy="90" r="1.0" opacity="0.6" />
								<circle cx="160" cy="310" r="0.8" opacity="0.5" />
								<circle cx="240" cy="310" r="1.0" opacity="0.6" />
								<circle cx="90" cy="170" r="1.2" opacity="0.7" />
								<circle cx="310" cy="170" r="0.8" opacity="0.5" />
								<circle cx="90" cy="230" r="0.5" opacity="0.4" />
								<circle cx="310" cy="230" r="1.2" opacity="0.7" />
								<circle cx="180" cy="170" r="0.8" opacity="0.5" />
								<circle cx="220" cy="170" r="1.0" opacity="0.6" />
								<circle cx="180" cy="230" r="0.5" opacity="0.4" />
								<circle cx="220" cy="230" r="0.8" opacity="0.5" />
								<circle cx="140" cy="220" r="1.0" opacity="0.6" />
								<circle cx="260" cy="220" r="1.5" opacity="0.8" />
								<circle cx="140" cy="180" r="0.5" opacity="0.4" />
								<circle cx="260" cy="180" r="1.0" opacity="0.6" />
							</g>

							<!-- Clockwork -->
							<g stroke="rgba(224, 203, 150, 0.35)" fill="rgba(224, 203, 150, 0.04)" fill-rule="evenodd"
								stroke-linejoin="round">
								<!-- Gears -->
								<path id="gear-central" />
								<path id="gear-left" />
								<path id="gear-right" />
								<path id="gear-bottom" />
								<path id="gear-outer" />

								<!-- Concentric inner rings -->
								<circle cx="200" cy="200" r="39" stroke-width="0.8" />
								<circle cx="200" cy="200" r="180" stroke-width="0.8" />
								<circle cx="200" cy="200" r="175" stroke-width="1.5" />
								<circle cx="200" cy="200" r="170" stroke-width="0.8" />
							</g>
						</svg>
					</div>

					<!-- Outer Connecting Rings -->
					<svg class="outer-icon-ring-svg" width="500" height="500" viewBox="0 0 500 500"
						style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; overflow: visible;">
						<path id="fancy-outer-ring" fill="none" stroke="rgba(180, 180, 180, 0.25)" stroke-width="1.5" />
						<path id="fancy-outer-ring-outward" fill="none" stroke="rgba(180, 180, 180, 0.25)"
							stroke-width="1.5" />
					</svg>

					<!-- Period Icons -->
					<div class="icon-ring">
						<!-- Noon -->
						<div class="period-icon sun-icon" style="--angle: -90deg">
							<svg viewBox="0 0 100 100" class="celestial-svg">
								<circle cx="50" cy="50" r="15" fill="none" stroke="currentColor" stroke-width="4" />
								<path
									d="M50 25 L50 15 M75 50 L85 50 M50 75 L50 85 M25 50 L15 50 M68 32 L75 25 M68 68 L75 75 M32 68 L25 75 M32 32 L25 25"
									stroke="currentColor" stroke-width="4" stroke-linecap="round" />
							</svg>
						</div>
						<!-- Sunset -->
						<div class="period-icon sunset-icon" style="--angle: 0deg">
							<svg viewBox="0 0 100 100" class="celestial-svg">
								<path d="M20 60 L80 60" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
								<path d="M35 60 A 15 15 0 0 1 65 60" fill="none" stroke="currentColor"
									stroke-width="4" />
								<path d="M50 35 L50 25 M35 40 L28 33 M65 40 L72 33" stroke="currentColor"
									stroke-width="4" stroke-linecap="round" />
							</svg>
						</div>
						<!-- Midnight -->
						<div class="period-icon moon-icon" style="--angle: 90deg">
							<svg viewBox="0 0 100 100" class="celestial-svg">
								<path d="M55 30 A 20 20 0 1 0 75 65 A 25 25 0 1 1 55 30 Z" fill="none"
									stroke="currentColor" stroke-width="4" />
								<polygon points="65,35 68,42 75,45 68,48 65,55 62,48 55,45 62,42" fill="currentColor" />
							</svg>
						</div>
						<!-- Sunrise -->
						<div class="period-icon sunrise-icon" style="--angle: 180deg">
							<svg viewBox="0 0 100 100" class="celestial-svg">
								<path d="M20 60 L80 60" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
								<path d="M35 60 A 15 15 0 0 1 65 60" fill="none" stroke="currentColor"
									stroke-width="4" />
								<path d="M50 35 L50 25 M35 40 L28 33 M65 40 L72 33" stroke="currentColor"
									stroke-width="4" stroke-linecap="round" />
							</svg>
						</div>
					</div>

					<!-- Inner Dots -->
					<div id="marker-ring"></div>

					<!-- Decorative Inner Rings -->
					<div class="inner-rings">
						<div class="ring ring-2"></div>
						<div class="ring ring-3"></div>
					</div>

					<!-- The Hour Needle -->
					<div class="needle-pivot">
						<svg class="hour-hand-svg" viewBox="0 0 100 240" width="100" height="240">
							<g class="hour-hand-glow-group">
								<!-- Outer pivot ring -->
								<circle cx="50" cy="200" r="18" class="hand-part-glow" />
								<!-- Inner pivot detail -->
								<circle cx="50" cy="200" r="10" class="hand-part-glow" />
								<!-- Solid pivot center -->
								<circle cx="50" cy="200" r="4" class="hand-part-solid-glow" />
								<!-- Counterweight peak/node -->
								<polygon points="46,217 50,223 54,217" class="hand-part-glow" />

								<!-- Braided Stem - Strand 1 -->
								<path
									d="M 44 184 C 44 172, 56 162, 56 150 C 56 138, 45 128, 45 120 L 53 120 C 53 128, 64 138, 64 150 C 64 162, 52 172, 52 184 Z"
									class="hand-part-glow" />
								<!-- Braided Stem - Strand 2 -->
								<path
									d="M 56 184 C 56 172, 44 162, 44 150 C 44 138, 55 128, 55 120 L 47 120 C 47 128, 36 138, 36 150 C 36 162, 48 172, 48 184 Z"
									class="hand-part-glow" />

								<!-- Arrowhead Frame -->
								<path
									d="M 50 90 L 32 112 Q 42 112 35 122 L 45 122 Q 50 114 55 122 L 65 122 Q 58 112 68 112 Z"
									class="hand-part-glow" />
								<!-- Inside Diamond Cutout -->
								<path d="M 50 100 L 45 110 L 50 117 L 55 110 Z" class="hand-part-cutout-glow" />
							</g>
							<g class="hour-hand-group">
								<!-- Outer pivot ring -->
								<circle cx="50" cy="200" r="18" class="hand-part" />
								<!-- Inner pivot detail -->
								<circle cx="50" cy="200" r="10" class="hand-part" />
								<!-- Solid pivot center -->
								<circle cx="50" cy="200" r="4" class="hand-part-solid" />
								<!-- Counterweight peak/node -->
								<polygon points="46,217 50,223 54,217" class="hand-part" />

								<!-- Braided Stem - Strand 1 -->
								<path
									d="M 44 184 C 44 172, 56 162, 56 150 C 56 138, 45 128, 45 120 L 53 120 C 53 128, 64 138, 64 150 C 64 162, 52 172, 52 184 Z"
									class="hand-part" />
								<!-- Braided Stem - Strand 2 -->
								<path
									d="M 56 184 C 56 172, 44 162, 44 150 C 44 138, 55 128, 55 120 L 47 120 C 47 128, 36 138, 36 150 C 36 162, 48 172, 48 184 Z"
									class="hand-part" />

								<!-- Arrowhead Frame -->
								<path
									d="M 50 90 L 32 112 Q 42 112 35 122 L 45 122 Q 50 114 55 122 L 65 122 Q 58 112 68 112 Z"
									class="hand-part" />
								<!-- Inside Diamond Cutout -->
								<path d="M 50 100 L 45 110 L 50 117 L 55 110 Z" class="hand-part-cutout" />
							</g>
						</svg>
					</div>

					<!-- The Minute Needle -->
					<div class="minute-needle-pivot">
						<svg class="minute-hand-svg" viewBox="0 0 100 240" width="100" height="240">
							<g class="minute-hand-glow-group">

								<circle cx="50" cy="200" r="4" class="hand-part-solid-glow" />
								<!-- Counterweight peak/node -->

								<!-- Braided Stem - Strand 1 -->
								<path
									d="M 44 184 C 44 165, 56 150, 56 130 C 56 115, 45 110, 45 105 L 53 105 C 53 110, 64 115, 64 130 C 64 150, 52 165, 52 184 Z"
									class="hand-part-glow" />
								<!-- Braided Stem - Strand 2 -->
								<path
									d="M 56 184 C 56 165, 44 150, 44 130 C 44 115, 55 110, 55 105 L 47 105 C 47 110, 36 115, 36 130 C 36 150, 48 165, 48 184 Z"
									class="hand-part-glow" />

								<!-- Arrowhead Frame -->
								<path
									d="M 50 55 L 32 90 Q 42 90 35 105 L 45 105 Q 50 93 55 105 L 65 105 Q 58 90 68 90 Z"
									class="hand-part-glow" />
								<!-- Inside Diamond Cutout -->
								<path d="M 50 70 L 44 85 L 50 95 L 56 85 Z" class="hand-part-cutout-glow" />
							</g>
							<g class="minute-hand-group">
								<!-- Outer pivot ring -->
								<circle cx="50" cy="200" r="18" class="hand-part" />
								<!-- Inner pivot detail -->
								<circle cx="50" cy="200" r="10" class="hand-part" />
								<!-- Solid pivot center -->
								<circle cx="50" cy="200" r="4" class="hand-part-solid" />
								<!-- Counterweight peak/node -->
								<polygon points="46,217 50,223 54,217" class="hand-part" />

								<!-- Braided Stem - Strand 1 -->
								<path
									d="M 44 184 C 44 165, 56 150, 56 130 C 56 115, 45 110, 45 105 L 53 105 C 53 110, 64 115, 64 130 C 64 150, 52 165, 52 184 Z"
									class="hand-part" />
								<!-- Braided Stem - Strand 2 -->
								<path
									d="M 56 184 C 56 165, 44 150, 44 130 C 44 115, 55 110, 55 105 L 47 105 C 47 110, 36 115, 36 130 C 36 150, 48 165, 48 184 Z"
									class="hand-part" />

								<!-- Arrowhead Frame -->
								<path
									d="M 50 55 L 32 90 Q 42 90 35 105 L 45 105 Q 50 93 55 105 L 65 105 Q 58 90 68 90 Z"
									class="hand-part" />
								<!-- Inside Diamond Cutout -->
								<path d="M 50 70 L 44 85 L 50 95 L 56 85 Z" class="hand-part-cutout" />
							</g>
						</svg>
					</div>
				</div>

				<!-- Digital Time Display -->
				<div class="digital-time-container">
					<svg class="crown-svg" viewBox="0 0 100 30" preserveAspectRatio="none">
						<path vector-effect="non-scaling-stroke" d="M 15 20 Q 25 10 35 15 L 46 25" fill="none"
							stroke="#fffbee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
						<path vector-effect="non-scaling-stroke" d="M 85 20 Q 75 10 65 15 L 54 25" fill="none"
							stroke="#fffbee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
						<polygon vector-effect="non-scaling-stroke" points="50,4 58,12 50,20 42,12" fill="none"
							stroke="#fffbee" stroke-width="2.5" stroke-linejoin="round" />
					</svg>
					<div class="digital-time">00:00</div>
					<svg class="crown-svg bottom-crown" viewBox="0 0 100 30" preserveAspectRatio="none"
						style="transform: scaleY(-1);">
						<path vector-effect="non-scaling-stroke" d="M 15 20 Q 25 10 35 15 L 46 25" fill="none"
							stroke="#fffbee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
						<path vector-effect="non-scaling-stroke" d="M 85 20 Q 75 10 65 15 L 54 25" fill="none"
							stroke="#fffbee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

							stroke="#fffbee" stroke-width="2.5" stroke-linejoin="round" />
					</svg>
				</div>
			</div>

			<!-- Date -->
			<div class="date-container-wrapper"
				style="margin-top: 30px; display: flex; justify-content: center; width: 600px;">
				<div class="scroll-box" style="position: relative; width: 460px; height: 75px;">

							style="position: absolute; top: 0; left: 0; pointer-events: none;">

								d="M 30 12 Q 115 17 215 15 L 230 11 L 245 15 Q 345 17 430 12 Q 432 37.5 430 63 Q 345 58 245 60 L 230 64 L 215 60 Q 115 58 30 63 Q 28 37.5 30 12 Z"
								fill="url(#dialog-bg-grad)" stroke="rgba(223, 208, 153, 0.45)" stroke-width="1.2"

							<!-- Top-Left Corner -->

								<path d="M 437 61 A 2.5 2.5 0 1 1 437 66" />
							</g>

							<g stroke="rgba(223, 208, 153, 0.65)" stroke-width="1.2" fill="none"

								<path d="M 230 70 L 234 64 L 230 58 L 226 64 Z" fill="rgba(223, 208, 153, 0.75)"
									stroke="none" />

								<path d="M 255 64 L 255 60 M 255 64 L 255 68 M 255 64 L 251 64 M 255 64 L 259 64" />

					</div>

					<!-- Bottom Roller -->
					<div class="scroll-bottom-roller">

							style="position: absolute; top: 0; left: 0; pointer-events: none;">

								fill="url(#dialog-bg-grad-2)" stroke="rgba(223, 208, 153, 0.45)" stroke-width="1.2"

							<g stroke="rgba(223, 208, 153, 0.65)" stroke-width="1.2" fill="none" stroke-linecap="round"
